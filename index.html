<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU4D IPA STORE</title>
    
    <!-- Home Screen Icon Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/MKvBZKy6/A16AE392-5288-4234-8BA7-2C676F44A169.jpg">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/MKvBZKy6/A16AE392-5288-4234-8BA7-2C676F44A169.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b0116; --accent-color: #a349ff; --glass-bg: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 480px; text-align: center; }
        
        .neon-name { font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900; color: #fff; text-transform: uppercase; margin: 15px 0 5px 0; letter-spacing: 6px; text-shadow: 0 0 7px #fff, 0 0 10px var(--accent-color), 0 0 20px var(--accent-color); }
        .sub-text { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px; color: #fff; opacity: 0.8; margin-bottom: 30px; text-transform: uppercase; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent-color); box-shadow: 0 0 20px var(--accent-color); object-fit: cover; margin-top: 20px; }
        
        .link-card { background: var(--glass-bg); border: 1px solid rgba(163, 73, 255, 0.3); border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; text-decoration: none; color: white; font-weight: 500; font-size: 15px; transition: 0.3s; }
        .link-icon { width: 30px !important; height: 30px !important; margin-right: 15px; border-radius: 6px; object-fit: cover; }
        .store-btn { background: var(--accent-color); justify-content: center; font-weight: bold; box-shadow: 0 0 15px var(--accent-color); }
        
        #storeSection { display: none; margin-top: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 0; }
        .product-card { background: var(--glass-bg); border-radius: 15px; padding: 12px; border: 1px solid rgba(163, 73, 255, 0.2); }
        .product-img { width: 100%; height: 85px; object-fit: contain; }
        .price { color: #00ed64; font-weight: bold; margin: 5px 0; }
        .buy-btn { background: var(--accent-color); color: white; border: none; padding: 9px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* Modal & Payment Status */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a0229; padding: 25px; border-radius: 20px; border: 2px solid var(--accent-color); width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--accent-color); background: #0b0116; color: white; box-sizing: border-box; }
        
        .status-box { display: none; margin-top: 15px; padding: 15px; border-radius: 12px; }
        .pending { background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; color: #ffc107; }
        .approved { background: rgba(0, 237, 100, 0.1); border: 1px solid #00ed64; color: #00ed64; }
        .dl-btn { display: inline-block; background: #00ed64; color: black; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HOME SECTION -->
        <div id="homeSection">
            <img src="https://i.postimg.cc/MKvBZKy6/A16AE392-5288-4234-8BA7-2C676F44A169.jpg" class="profile-img">
            <div class="neon-name">FU4D</div>
            <div class="sub-text">PREMIUM SERVICES & APPS</div>
            
            <a href="#" onclick="showStore()" class="link-card store-btn">🛒 ONLINE STORE</a>
            
            <a href="https://www.tiktok.com/@furd_f4huu4" class="link-card"><img src="https://i.postimg.cc/NjGzjngd/IMG-3578.jpg" class="link-icon"> TikTok</a>
            <a href="https://t.me/fahuu_xzzz" class="link-card"><img src="https://i.postimg.cc/L5Hz3rQx/IMG-3580.jpg" class="link-icon"> Telegram</a>
            <a href="https://www.facebook.com/fah.huu.2025" class="link-card"><img src="https://i.postimg.cc/mD36p98P/fb-icon.png" class="link-icon"> Facebook</a>
        </div>

        <!-- STORE SECTION -->
        <div id="storeSection">
            <button onclick="hideStore()" style="background:none; border:none; color:var(--accent-color); cursor:pointer; font-weight:bold; font-size: 16px; margin-bottom:15px;">← Back</button>
            <div class="grid-container">
                <!-- PRODUCT EXAMPLES - Link e download link bosiye diben -->
                <div class="product-card">
                    <img src="https://i.postimg.cc/LsF5KjkY/IMG-3568.jpg" class="product-img">
                    <h3>CapCut</h3>
                    <div class="price">14$</div>
                    <button class="buy-btn" onclick="openPayment('CapCut', 'https://your-download-link-here.com')">BUY</button>
                </div>
                <div class="product-card">
                    <img src="https://i.postimg.cc/N0BsCpDj/IMG-1494.jpg" class="product-img">
                    <h3>Wink</h3>
                    <div class="price">18$</div>
                    <button class="buy-btn" onclick="openPayment('Wink', 'https://your-download-link-here.com')">BUY</button>
                </div>
                <!-- Baki product gulo eivhabe add korun -->
            </div>
        </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:var(--accent-color); margin-top:0;">Payment</h3>
            <p style="color:#00ed64; font-weight:bold;">Bikash: 01938908314</p>
            
            <div id="inputForm">
                <input type="text" id="userNumber" placeholder="Bikash Number" required>
                <input type="text" id="userTrx" placeholder="Transaction ID (TrxID)" required>
                <button onclick="submitPayment()" class="buy-btn" style="background:#00ed64; color:black; font-size:14px; padding:12px;">SUBMIT FOR VERIFY</button>
            </div>

            <div id="statusBox" class="status-box">
                <div id="statusText"></div>
                <div id="downloadArea"></div>
            </div>

            <button onclick="closeModal()" style="background:none; border:none; color:white; margin-top:20px; opacity:0.5; cursor:pointer;">Close</button>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBDqxKX8BirBB_3OEUyU0r_kWPQKAAO-c",
            authDomain: "fu4d-ipa-store.firebaseapp.com",
            projectId: "fu4d-ipa-store",
            storageBucket: "fu4d-ipa-store.firebasestorage.app",
            messagingSenderId: "432935248847",
            appId: "1:432935248847:web:aaf0cb756a25b04b15a8ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentProduct = "";
        let currentDL = "";

        window.showStore = () => { document.getElementById('homeSection').style.display='none'; document.getElementById('storeSection').style.display='block'; }
        window.hideStore = () => { document.getElementById('homeSection').style.display='block'; document.getElementById('storeSection').style.display='none'; }
        
        window.openPayment = (name, dlLink) => {
            currentProduct = name;
            currentDL = dlLink;
            document.getElementById('modalTitle').innerText = "Buy " + name;
            document.getElementById('paymentModal').style.display = 'flex';
            document.getElementById('inputForm').style.display = 'block';
            document.getElementById('statusBox').style.display = 'none';
        }

        window.closeModal = () => { document.getElementById('paymentModal').style.display = 'none'; }

        window.submitPayment = () => {
            const num = document.getElementById('userNumber').value;
            const trx = document.getElementById('userTrx').value;
            if(!num || !trx) return alert("Information fill-up korun!");

            const orderId = "order_" + Date.now();
            set(ref(db, 'orders/' + orderId), {
                product: currentProduct,
                number: num,
                trxid: trx,
                status: "pending",
                downloadLink: currentDL
            });

            document.getElementById('inputForm').style.display = 'none';
            listenForApproval(orderId);
        }

        function listenForApproval(orderId) {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            statusBox.style.display = 'block';

            onValue(ref(db, 'orders/' + orderId), (snapshot) => {
                const data = snapshot.val();
                if(data.status === "pending") {
                    statusBox.className = "status-box pending";
                    statusText.innerHTML = "<b>STATUS: PENDING</b><br>Verification-er jonno ektu opekkha korun...";
                } else if(data.status === "approved") {
                    statusBox.className = "status-box approved";
                    statusText.innerHTML = "<b>STATUS: VERIFIED!</b><br>Payment confirmed.";
                    document.getElementById('downloadArea').innerHTML = `<a href="${data.downloadLink}" class="dl-btn" target="_blank">DOWNLOAD NOW</a>`;
                }
            });
        }
    </script>
</body>
</html>

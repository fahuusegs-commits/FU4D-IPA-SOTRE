<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU4D IPA STORE</title>
    <style>
        :root {
            --bg-color: #0b0116;
            --accent-color: #a349ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 450px; text-align: center; }

        .profile-section { margin: 40px 0 20px; }
        .profile-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 30px var(--accent-color);
            object-fit: cover;
        }
        h1 { font-size: 26px; margin: 15px 0 5px; letter-spacing: 2px; }
        .tagline { opacity: 0.6; font-size: 14px; margin-bottom: 30px; }

        .link-card {
            background: var(--glass-bg);
            border: 1px solid rgba(163, 73, 255, 0.3);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }
        .link-card:hover { background: rgba(163, 73, 255, 0.15); transform: translateY(-2px); }
        .link-icon { width: 32px; height: 32px; margin-right: 15px; border-radius: 8px; object-fit: cover; }
        .store-btn { background: var(--accent-color); justify-content: center; font-weight: bold; box-shadow: 0 0 20px var(--accent-color); }

        #storeSection { display: none; margin-top: 20px; }
        .back-btn { background: none; border: none; color: var(--accent-color); cursor: pointer; margin-bottom: 20px; font-size: 16px; font-weight: bold; }
        
        .product-card {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(163, 73, 255, 0.2);
        }
        .product-img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; }
        .price { color: #00ed64; font-size: 24px; font-weight: bold; margin: 10px 0; }
        .buy-btn { background: var(--accent-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a0229; padding: 25px; border-radius: 25px; border: 2px solid var(--accent-color); width: 85%; max-width: 340px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--accent-color); background: #0b0116; color: white; box-sizing: border-box; }
        .submit-btn { background: #00ed64; color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="homeSection">
            <div class="profile-section">
                <img src="https://i.postimg.cc/MKvBZKy6/A16AE392-5288-4234-8BA7-2C676F44A169.jpg" class="profile-img">
                <h1>FU4D IPA STORE</h1>
                <p class="tagline">PREMIUM SERVICES & APPS</p>
            </div>

            <a href="#" onclick="showStore()" class="link-card store-btn">🛒 ONLINE STORE</a>

            <a href="https://www.tiktok.com/@furd_f4huu4?_r=1&_t=ZS-96ACuqoVATo" target="_blank" class="link-card">
                <img src="https://i.postimg.cc/NjGzjngd/IMG-3578.jpg" class="link-icon"> TikTok
            </a>

            <a href="https://t.me/fahuu_xzzz" target="_blank" class="link-card">
                <img src="https://i.postimg.cc/L5Hz3rQx/IMG-3580.jpg" class="link-icon"> Telegram
            </a>

            <a href="https://www.facebook.com/fah.huu.2025" target="_blank" class="link-card">
                <img src="https://i.postimg.cc/mD36p98P/fb-icon.png" class="link-icon"> Facebook
            </a>

            <a href="#" onclick="openMore()" class="link-card">✨ MORE ITEMS (UPCOMING)</a>
        </div>

        <div id="storeSection">
            <button class="back-btn" onclick="hideStore()">← Back to Profile</button>
            
            <div class="product-card">
                <img src="https://i.postimg.cc/LsF5KjkY/IMG-3568.jpg" class="product-img">
                <h3>CAPCUT PREMIUM</h3>
                <div class="price">14$</div>
                <button class="buy-btn" onclick="openPayment('CAPCUT')">BUY NOW</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/N0BsCpDj/IMG-1494.jpg" class="product-img">
                <h3>WINK PREMIUM</h3>
                <div class="price">18$</div>
                <button class="buy-btn" onclick="openPayment('WINK')">BUY NOW</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/HkwHMR5r/IMG-3569.jpg" class="product-img">
                <h3>NETFLIX PREMIUM</h3>
                <div class="price">8$</div>
                <button class="buy-btn" onclick="openPayment('NETFLIX')">BUY NOW</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/RCWWtC0q/IMG-3567.jpg" class="product-img">
                <h3>ALIGHT MOTION PREMIUM</h3>
                <div class="price">5$</div>
                <button class="buy-btn" onclick="openPayment('ALIGHT MOTION')">BUY NOW</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/63ktnXHQ/IMG-3570.jpg" class="product-img">
                <h3>ALL IN ONE</h3>
                <div class="price">10$</div>
                <button class="buy-btn" onclick="openPayment('ALL IN ONE')">BUY NOW</button>
            </div>

            <div class="product-card">
                <img src="https://i.postimg.cc/xCHWrbR3/IMG-3571.jpg" class="product-img">
                <h3>VIDEO STAR</h3>
                <div class="price">30$</div>
                <button class="buy-btn" onclick="openPayment('VIDEO STAR')">BUY NOW</button>
            </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#00ed64;">Confirm Payment</h2>
            <p>Bikash (Send Money):<br><strong>01938908314</strong></p>
            
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <input type="hidden" name="Product" id="selectedProduct">
                <input type="text" name="TrxID" placeholder="Enter Transaction ID (TrxID)" required>
                <input type="text" name="Phone" placeholder="Your Bikash Number" required>
                <button type="submit" class="submit-btn">SUBMIT ORDER ✅</button>
            </form>
            <button onclick="closePayment()" style="background:none; border:none; color:white; margin-top:15px; cursor:pointer; opacity:0.6;">Cancel</button>
        </div>
    </div>

    <script>
        function showStore() { 
            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('storeSection').style.display = 'block';
            window.scrollTo(0,0);
        }
        function hideStore() { 
            document.getElementById('homeSection').style.display = 'block';
            document.getElementById('storeSection').style.display = 'none';
        }
        function openPayment(name) {
            document.getElementById('selectedProduct').value = name;
            document.getElementById('paymentModal').style.display = 'flex';
        }
        function closePayment() {
            document.getElementById('paymentModal').style.display = 'none';
        }
        function openMore() {
            alert("Premium Shakes, XML, and CC are coming soon!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FU4D PREMIUM STORE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/L4TsgnGt/Project-Name-109.png">
    <link rel="shortcut icon" href="https://i.postimg.cc/L4TsgnGt/Project-Name-109.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-main: #05060a;
            --bg-card: #0d0f17;
            --accent-glow: #00f5d4;
            --accent-neon: #2d00f7;
            --accent-gradient: linear-gradient(135deg, #2d00f7 0%, #8900f2 100%);
            --text-muted: #8F9CAE;
            --glass-nav: rgba(13, 15, 23, 0.85);
        }
        
        body { 
            background-color: var(--bg-main);
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(45, 0, 247, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(45, 0, 247, 0.02) 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.05) 0%, transparent 65%);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
        }
        
        .container { 
            width: 100%; 
            max-width: 430px; 
            box-sizing: border-box; 
            position: relative; 
            z-index: 1; 
            padding-bottom: 110px;
        }
        
        #homeSection { padding: 0; text-align: center; }

        .cover-banner-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            background-image: url('https://i.postimg.cc/050QFP1N/068B7647-FF2B-4696-83F2-9A2F8897CA58.gif'); 
            background-size: cover;
            background-position: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .glass-banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(5, 6, 10, 0.1) 0%, rgba(5, 6, 10, 0.85) 100%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
        }

        .profile-container {
            position: relative;
            display: inline-block;
            margin-top: -65px; 
            z-index: 10;
        }

        .glass-avatar-shield {
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            z-index: -1;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .profile-img { 
            width: 115px; 
            height: 115px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .brand-title { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 38px; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin: 18px 0 2px 0; 
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(45,0,247,0.3);
        }
        
        .brand-subtitle { 
            font-size: 12px; 
            font-weight: 700;
            letter-spacing: 5px; 
            color: var(--accent-glow);
            margin: 0 0 18px 0; 
            text-transform: uppercase; 
        }

        .store-desc {
            font-size: 13.5px;
            color: #a4b3c6;
            line-height: 1.6;
            margin: 0 auto 35px auto;
            max-width: 330px;
            font-weight: 500;
            padding: 0 20px;
        }
        
        .app-action-card { 
            background: var(--accent-gradient);
            border-radius: 20px;
            padding: 18px 24px;
            margin: 0 20px 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 8px 25px rgba(45, 0, 247, 0.3);
            transition: transform 0.2s ease;
            text-align: left;
        }
        .app-action-card:active { transform: scale(0.98); }
        .card-meta { display: flex; align-items: center; gap: 15px; }
        .card-meta img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
        
        .social-link-tiles-wrapper { padding: 0 20px; }
        .social-link-tile { 
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 18px; 
            padding: 16px 20px; 
            margin-bottom: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: #ffffff; 
            transition: background 0.2s ease;
            text-align: left;
        }
        .social-link-tile:hover { background: #141724; }
        .social-info { display: flex; align-items: center; gap: 16px; }
        .social-info img { width: 28px; height: 28px; object-fit: contain; border-radius: 0px; filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.3)); }
        .social-info span { font-size: 16px; font-weight: 600; color: #ffffff; }
        .arrow-right-icon { color: var(--text-muted); font-size: 13px; }

        /* STORE VIEW LAYOUT */
        #storeSection { display: none; padding: 25px 20px 20px 20px; }
        .store-header-title { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: white; margin: 10px 0 20px 0; text-align: center; }
        
        .search-box-wrapper { margin-bottom: 22px; position: relative; }
        .search-box-wrapper i { position: absolute; left: 18px; top: 16px; color: var(--text-muted); font-size: 15px; }
        .search-input-field { width: 100%; padding: 15px 15px 15px 48px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); background-color: var(--bg-card); color: white; font-size: 15px; outline: none; box-sizing: border-box; }
        
        .category-tab-scroller { display: flex; gap: 10px; padding-bottom: 10px; overflow-x: auto; white-space: nowrap; margin-bottom: 20px; }
        .category-tab-scroller::-webkit-scrollbar { display: none; }
        .cat-tab { background-color: var(--bg-card); color: var(--text-muted); padding: 11px 22px; border-radius: 50px; font-size: 14px; cursor: pointer; border: 1px solid transparent; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .cat-tab.active { background-color: #ffffff; color: #000000; font-weight: 700; }

        /* APPS GRID SYSTEM */
        .apps-grid-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .app-item-card { background: var(--bg-card); border-radius: 22px; padding: 22px 16px; border: 1px solid rgba(255,255,255,0.02); text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; }
        .app-item-avatar { width: 76px; height: 76px; border-radius: 18px; object-fit: cover; margin-bottom: 12px; }
        .app-item-card h3 { font-size: 15.5px; font-weight: 700; margin: 0 0 4px 0; color: white; }
        .app-item-subtext { color: var(--text-muted); font-size: 12px; margin-bottom: 16px; }
        
        .app-dl-trigger { 
            background: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 11px 0; 
            width: 90%; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 12.5px; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: transform 0.15s ease, background 0.15s ease;
            box-shadow: 0 4px 12px rgba(255,255,255,0.1);
        }
        .app-dl-trigger:active { transform: scale(0.94); }

        /* SIGN TOOLS LAYOUT CONTAINER */
        #signToolsView { display: none; }
        .tool-panel-card { background: var(--bg-card); border-radius: 22px; padding: 25px 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.02); text-align: left; }
        .tool-panel-card h4 { margin: 0 0 10px 0; font-size: 17px; color: var(--accent-glow); font-weight: 700; }
        .tool-panel-card p { margin: 0 0 16px 0; font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        
        .tool-input-
                    <i class="fa-solid fa-link" style="position: absolute; left: 15px; top: 15px; color: var(--text-muted); font-size: 13px;"></i>
        </div>
        <button onclick="triggerDirectIosEngine()" style="background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 100%); color: #000000; border: none; padding: 14px; width: 100%; border-radius: 14px; font-weight: 800; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,245,212,0.2); display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i class="fa-solid fa-bolt"></i> Direct Install In iPhone
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Core Cloud Architecture Bundle Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCBDqxKX8BirBB_3OEUyU0r_kWPQKAAO-c",
            authDomain: "fu4d-ipa-store.firebaseapp.com",
            projectId: "fu4d-ipa-store",
            storageBucket: "fu4d-ipa-store.firebasestorage.app",
            messagingSenderId: "432935248847",
            appId: "1:432935248847:web:aaf0cb756a25b04b15a8ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let activeProductPayload = ""; 
        let activeDownloadPayload = "";

        // UI Management Control Functions
        window.displayStore = () => { 
            document.getElementById('homeSection').style.display = 'none'; 
            document.getElementById('storeSection').style.display = 'block'; 
            document.getElementById('storeBottomNav').style.display = 'flex'; 
            // Custom Installer display tracking rules inside store view layout
            document.getElementById('storeSection').appendChild(document.getElementById('customInstallerCard'));
        }
        
        window.dismissStore = () => { 
            document.getElementById('homeSection').style.display = 'block'; 
            document.getElementById('storeSection').style.display = 'none'; 
            document.getElementById('storeBottomNav').style.display = 'none'; 
            // Move back structural dynamic nodes safely to root tracking layout
            document.getElementById('homeSection').appendChild(document.getElementById('customInstallerCard'));
        }

        window.openUpcomingView = (tabName) => {
            document.getElementById('upcomingTitle').innerText = tabName + " Locked";
            document.getElementById('upcomingAlertLayer').style.display = 'flex';
        }
        
        window.closeUpcomingView = () => {
            document.getElementById('upcomingAlertLayer').style.display = 'none';
        }

        window.triggerCheckout = (name, dlLink) => { 
            activeProductPayload = name; 
            activeDownloadPayload = dlLink;
            document.getElementById('gatewayForm').style.display = 'block';
            document.getElementById('flowStatusPanel').style.display = 'none';
            document.getElementById('checkoutSystemModal').style.display = 'flex'; 
        }
        
        window.dismissCheckout = () => { 
            document.getElementById('checkoutSystemModal').style.display = 'none'; 
        }

        // Firebase Payment Order Record Engine
        window.processOrderPayload = () => {
            const clientPhone = document.getElementById('billingPhone').value;
            const clientTrx = document.getElementById('billingTrxId').value;
            if(!clientPhone || !clientTrx) return alert("Sothik tatthyo submit korun!");
            
            const generatedOrderId = "order_" + Date.now();
            set(ref(db, 'orders/' + generatedOrderId), { 
                product: activeProductPayload, 
                number: clientPhone, 
                trxid: clientTrx, 
                status: "pending", 
                downloadLink: activeDownloadPayload 
            });
            
            document.getElementById('gatewayForm').style.display = 'none';
            attachPayloadListener(generatedOrderId);
        }

        // Realtime Database Event Tracking Thread Listener
        function attachPayloadListener(orderId) {
            const flowStatusPanel = document.getElementById('flowStatusPanel'); 
            const flowStatusText = document.getElementById('flowStatusText');
            flowStatusPanel.style.display = 'block';
            
            onValue(ref(db, 'orders/' + orderId), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                
                if(data.status === "pending") {
                    flowStatusPanel.className = "flow-status-card pending";
                    flowStatusText.innerHTML = "<b>STATUS: PENDING</b><br>Payment validation running. Wait krun...";
                } else if(data.status === "approved") {
                    flowStatusPanel.className = "flow-status-card approved";
                    flowStatusText.innerHTML = "<b>STATUS: VERIFIED SUCCESS!</b>";
                    
                    // Direct dynamic mapping of OTA architecture via Signtools distribution layer
                    const finalOtaSignerUrl = "itms-services://?action=download-manifest&url=https://signtools.ipaomtk.com/?ipa=" + encodeURIComponent(data.downloadLink);
                    document.getElementById('flowDownloadContainer').innerHTML = `<a href="${finalOtaSignerUrl}" class="dynamic-dl-anchor">INSTALL NOW ON IPHONE</a>`;
                }
            });
        }

        // CLIENTSIDE OTA SIGNER INTEGRATION PROTOCOL MACHINE ENGINE 
        window.triggerDirectIosEngine = () => {
            const externalUserIpaUrl = document.getElementById('customIpaUrlInput').value.trim();
            if(!externalUserIpaUrl) {
                alert("An error occurred: Please input a valid direct .ipa file URL path link first!");
                return;
            }
            if(!externalUserIpaUrl.toLowerCase().endsWith('.ipa') && !externalUserIpaUrl.includes('.ipa?')) {
                alert("Security warning: Provided link does not seem to point to a valid Apple iOS .ipa binary package file!");
                return;
            }
            
            // Generate standard manifest runtime pointer package structure automatically 
            const interactiveOtaLinkPayload = "itms-services://?action=download-manifest&url=https://signtools.ipaomtk.com/?ipa=" + encodeURIComponent(externalUserIpaUrl);
            
            // Trigger automatic runtime native OS application pop-up installation call thread
            window.location.href = interactiveOtaLinkPayload;
        }

        // Live Realtime UI Search filtering subsystem layer module engine code
        const searchInput = document.querySelector('.search-input-field');
        if(searchInput) {
            searchInput.addEventListener('input', function(e) {
                const queryStr = e.target.value.toLowerCase().trim();
                const cardsList = document.querySelectorAll('.app-item-card');
                
                cardsList.forEach(card => {
                    const titleText = card.querySelector('h3').innerText.toLowerCase();
                    if(titleText.includes(queryStr)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }
    </script>
</body>
</html>
